services:
  # ==========================================
  # DATABASES
  # ==========================================
  identity-db:
    image: postgres:15-alpine
    container_name: identity-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: identity
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - campaign-network

  campaign-db:
    image: postgres:15-alpine
    container_name: campaign-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: campaign
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - campaign-network

  ai-db:
    image: postgres:15-alpine
    container_name: ai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ai
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - campaign-network

  gamification-db:
    image: postgres:15-alpine
    container_name: gamification-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: gamification
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - campaign-network

  # ==========================================
  # MESSAGE BROKER
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - campaign-network

  # ==========================================
  # MICROSERVICES & GATEWAY & FRONTEND
  # ==========================================
  frontend:
    build:
      context: ./apps/frontend
    container_name: frontend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - campaign-network

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    environment:
      PORT: 8080
      API_GATEWAY_PORT: 8080
      JWT_SECRET: campaigncell-secret-key-change-in-prod
      IDENTITY_SERVICE_URL: http://identity-service:3001
      CAMPAIGN_SERVICE_URL: http://campaign-service:3002
      AI_SERVICE_URL: http://ai-service:8000
      GAMIFICATION_SERVICE_URL: http://gamification-service:3003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
      - campaign-service
      - ai-service
      - gamification-service
      - rabbitmq
    networks:
      - campaign-network

  identity-service:
    build:
      context: ./services/identity-service
    container_name: identity-service
    environment:
      PORT: 3001
      IDENTITY_SERVICE_PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@identity-db:5432/identity
      JWT_SECRET: campaigncell-secret-key-change-in-prod
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3001:3001"
    depends_on:
      identity-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

  campaign-service:
    build:
      context: ./services/campaign-service
    container_name: campaign-service
    environment:
      PORT: 3002
      CAMPAIGN_SERVICE_PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@campaign-db:5432/campaign
      JWT_SECRET: campaigncell-secret-key-change-in-prod
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3002:3002"
    depends_on:
      campaign-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

  ai-service:
    build:
      context: ./services/ai-service
    container_name: ai-service
    environment:
      PORT: 8000
      AI_SERVICE_PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@ai-db:5432/ai
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      IDENTITY_SERVICE_URL: http://identity-service:3001
    ports:
      - "8000:8000"
    depends_on:
      ai-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

  gamification-service:
    build:
      context: ./services/gamification-service
    container_name: gamification-service
    environment:
      PORT: 3003
      GAMIFICATION_SERVICE_PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@gamification-db:5432/gamification
      JWT_SECRET: campaigncell-secret-key-change-in-prod
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      IDENTITY_SERVICE_URL: http://identity-service:3001
    ports:
      - "3003:3003"
    depends_on:
      gamification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

networks:
  campaign-network:
    driver: bridge
