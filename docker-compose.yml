version: '3.8'

services:
  # ==========================================
  # DATABASES
  # ==========================================
  identity-db:
    image: postgres:15-alpine
    container_name: identity-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: identity
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d identity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - campaign-network

  campaign-db:
    image: postgres:15-alpine
    container_name: campaign-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: campaign
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d campaign"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - campaign-network

  ai-db:
    image: postgres:15-alpine
    container_name: ai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ai
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ai"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - campaign-network

  gamification-db:
    image: postgres:15-alpine
    container_name: gamification-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: gamification
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d gamification"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - campaign-network

  # ==========================================
  # MESSAGE BROKER
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - campaign-network

  # ==========================================
  # SERVICES (Phase 2 Stubs)
  # ==========================================
  frontend:
    build:
      context: ./apps/frontend
    container_name: frontend
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      SERVICE_NAME: Frontend
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    networks:
      - campaign-network

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    environment:
      PORT: ${API_GATEWAY_PORT:-8080}
      SERVICE_NAME: API Gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:${API_GATEWAY_PORT:-8080}"
    networks:
      - campaign-network

  identity-service:
    build:
      context: ./services/identity-service
    container_name: identity-service
    environment:
      PORT: ${IDENTITY_SERVICE_PORT:-3001}
      SERVICE_NAME: Identity Service
    ports:
      - "${IDENTITY_SERVICE_PORT:-3001}:${IDENTITY_SERVICE_PORT:-3001}"
    depends_on:
      identity-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

  campaign-service:
    build:
      context: ./services/campaign-service
    container_name: campaign-service
    environment:
      PORT: ${CAMPAIGN_SERVICE_PORT:-3002}
      SERVICE_NAME: Campaign Service
    ports:
      - "${CAMPAIGN_SERVICE_PORT:-3002}:${CAMPAIGN_SERVICE_PORT:-3002}"
    depends_on:
      campaign-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

  ai-service:
    build:
      context: ./services/ai-service
    container_name: ai-service
    environment:
      PORT: ${AI_SERVICE_PORT:-8000}
      SERVICE_NAME: AI Service
    ports:
      - "${AI_SERVICE_PORT:-8000}:${AI_SERVICE_PORT:-8000}"
    depends_on:
      ai-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

  gamification-service:
    build:
      context: ./services/gamification-service
    container_name: gamification-service
    environment:
      PORT: ${GAMIFICATION_SERVICE_PORT:-3003}
      SERVICE_NAME: Gamification Service
    ports:
      - "${GAMIFICATION_SERVICE_PORT:-3003}:${GAMIFICATION_SERVICE_PORT:-3003}"
    depends_on:
      gamification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campaign-network

networks:
  campaign-network:
    driver: bridge
